<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXW</title>
    <link rel="stylesheet" href="main.css">

    <!--
      Import map for @strudel/web subpackages. Loaded via esm.sh
      so no build step is required. The @strudel/web umbrella is
      preferred for runtime use because it bundles core, mini,
      and webaudio together and avoids the duplicate-copies-of-
      core problem that a four-package import map can produce.
      The individual subpackage entries are kept for the spike
      page (spike-strudel.html) which uses them directly.
    -->
    <script type="importmap">
      {
        "imports": {
          "@strudel/web": "https://esm.sh/@strudel/web",
          "@strudel/core": "https://esm.sh/@strudel/core",
          "@strudel/mini": "https://esm.sh/@strudel/mini",
          "@strudel/webaudio": "https://esm.sh/@strudel/webaudio",
          "@strudel/tonal": "https://esm.sh/@strudel/tonal"
        }
      }
    </script>
</head>
<body>
    <div id="app">
        <!-- Combined top row: menu on the left, transport centred, wordmark on the right. -->
        <header id="top-row">
            <nav id="menubar" role="menubar" aria-label="Main menu">
                <div class="menu-item" role="menuitem" tabindex="0">GXW</div>
                <div class="menu-item" role="menuitem" tabindex="0">File</div>
                <div class="menu-item" role="menuitem" tabindex="0">Edit</div>
                <div class="menu-item" role="menuitem" tabindex="0">View</div>
                <div class="menu-item" role="menuitem" tabindex="0">Run</div>
            </nav>

            <div id="transport-controls" aria-label="Transport">
                <button class="transport-btn engine-state-idle" id="load-engine-btn" aria-label="Load audio engine">Load Engine</button>
                <button class="transport-btn" id="rewind-btn" aria-label="Rewind to start">⏮</button>
                <button class="transport-btn" id="play-btn" aria-label="Play">▶</button>
                <div class="elapsed-time" id="elapsed-time">0:00:00</div>
                <div class="musical-position" id="musical-position">1.1.000</div>
                <div class="field-group" id="bpm-group">
                    <label for="bpm-input" class="field-label">BPM</label>
                    <input
                        type="number"
                        id="bpm-input"
                        class="field-input"
                        min="1"
                        max="1000"
                        step="1"
                        value="120"
                    >
                </div>
                <div class="midi-indicator" id="midi-indicator" aria-label="MIDI output status">MIDI: —</div>
            </div>

            <div id="app-wordmark" aria-hidden="true">
                <span id="saved-indicator" class="saved-indicator">Saved</span>
                <span id="current-score-name" title="Click to rename"></span>
                <span id="wordmark-text">GXW</span>
            </div>
        </header>

        <!-- Horizontal grey divider below the top row -->
        <div class="divider-horizontal" aria-hidden="true"></div>

        <!-- Main body: editor left, canvas right, draggable divider between. -->
        <main id="body">
            <section id="editor-pane" aria-label="Editor">
                <div class="tab-bar" role="tablist">
                    <!-- Tabs are rendered dynamically from the bundle; see src/editor.js. -->
                    <div class="tab-bar-filler"></div>
                </div>
                <div id="editor-area" class="hidden">
                    <!-- CodeMirror mounts here. Hidden by default;
                         the editor swaps which of editor-area and
                         inspector-area is visible based on the
                         active tab. -->
                </div>
                <div id="inspector-area">
                    <!-- Form-based property inspector is mounted
                         here by src/inspector.js (via the editor).
                         Visible by default since the Properties
                         tab is the initial landing tab. -->
                </div>
            </section>

            <!-- Draggable vertical divider between editor and canvas.
                 The editor pane houses the property inspector, whose
                 widest row sets a hard floor on how narrow the pane
                 can go (any narrower would clip fields). The divider
                 honours that floor while letting the user pull the
                 inspector wider for breathing room; its position is
                 persisted across sessions. Use View → Hide Inspector
                 (or Cmd-\) to remove the inspector pane entirely. -->
            <div id="body-divider" class="divider-vertical divider-draggable" role="separator" aria-orientation="vertical" aria-label="Resize editor and canvas panes" tabindex="0"></div>

            <!-- Canvas pane splits vertically into canvas area on top
                 and message area below, separated by a draggable
                 horizontal divider. -->
            <section id="canvas-pane" aria-label="Canvas">
                <div id="canvas-toolbar" role="toolbar" aria-label="Object tools">
                    <!-- Tool buttons rendered by src/toolbar.js. -->
                </div>
                <div id="canvas-area">
                    <!-- HTML canvas element is created by src/canvas.js. -->
                </div>

                <div id="message-divider" class="divider-horizontal divider-draggable" role="separator" aria-orientation="horizontal" aria-label="Resize canvas and message area" tabindex="0"></div>

                <div id="message-area">
                    <div class="message-placeholder">(No messages)</div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
